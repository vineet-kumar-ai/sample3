<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MyWebsite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        .input-group {
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .links {
            text-align: center;
            margin-top: 25px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .error {
            color: #ff3333;
            font-size: 13px;
            margin-top: 5px;
            display: none;
            padding-left: 5px;
        }

        .success {
            color: #28a745;
            font-size: 14px;
            margin-top: 5px;
            display: none;
            padding: 10px;
            background: #d4edda;
            border-radius: 5px;
            border: 1px solid #c3e6cb;
        }

        .password-strength {
            height: 5px;
            background: #e0e0e0;
            border-radius: 5px;
            margin-top: 8px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background 0.3s;
        }

        .terms {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
        }

        .terms input {
            width: auto;
        }

        .terms label {
            margin-bottom: 0;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Create Account</h2>
        <div class="subtitle">Join our community today</div>

        <form id="signupForm" onsubmit="return validateSignup()">
            <div class="form-group">
                <label for="fullname">Full Name</label>
                <div class="input-group">
                    <input type="text" id="fullname" placeholder="Enter your full name" required>
                </div>
                <div class="error" id="nameError">Name must be at least 2 characters</div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="error" id="emailError">Please enter a valid email</div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Create a password" required
                        onkeyup="checkPasswordStrength()">
                </div>
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <div class="error" id="passwordError">Password must be at least 6 characters</div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-group">
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                <div class="error" id="confirmError">Passwords do not match</div>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
            </div>

            <button type="submit" class="btn">Create Account</button>

            <div class="links">
                <a href="login.html">Already have an account? Login</a>
            </div>

            <div class="success" id="successMessage">
                Account created successfully! Redirecting to login...
            </div>
        </form>
    </div>

    <script>
        function checkPasswordStrength() {
            let password = document.getElementById('password').value;
            let strengthBar = document.getElementById('strengthBar');
            let strength = 0;

            if (password.length >= 6) strength += 25;
            if (password.match(/[a-z]+/)) strength += 25;
            if (password.match(/[A-Z]+/)) strength += 25;
            if (password.match(/[0-9]+/)) strength += 25;

            strengthBar.style.width = strength + '%';

            if (strength < 50) {
                strengthBar.style.background = '#ff4444';
            } else if (strength < 75) {
                strengthBar.style.background = '#ffbb33';
            } else {
                strengthBar.style.background = '#00C851';
            }
        }

        function validateSignup() {
            let fullname = document.getElementById('fullname').value;
            let email = document.getElementById('email').value;
            let password = document.getElementById('password').value;
            let confirmPassword = document.getElementById('confirmPassword').value;
            let terms = document.getElementById('terms').checked;

            let nameError = document.getElementById('nameError');
            let emailError = document.getElementById('emailError');
            let passwordError = document.getElementById('passwordError');
            let confirmError = document.getElementById('confirmError');
            let successMessage = document.getElementById('successMessage');

            let isValid = true;

            // Hide all error messages
            nameError.style.display = 'none';
            emailError.style.display = 'none';
            passwordError.style.display = 'none';
            confirmError.style.display = 'none';
            successMessage.style.display = 'none';

            // Name validation
            if (fullname.length < 2) {
                nameError.style.display = 'block';
                isValid = false;
            }

            // Email validation
            if (!email.includes('@') || !email.includes('.')) {
                emailError.style.display = 'block';
                isValid = false;
            }

            // Password validation
            if (password.length < 6) {
                passwordError.style.display = 'block';
                isValid = false;
            }

            // Confirm password validation
            if (password !== confirmPassword) {
                confirmError.style.display = 'block';
                isValid = false;
            }

            // Terms validation
            if (!terms) {
                alert('Please agree to the Terms of Service');
                isValid = false;
            }

            if (isValid) {
                successMessage.style.display = 'block';

                // Store user data
                let userData = {
                    name: fullname,
                    email: email,
                    password: password
                };
                sessionStorage.setItem('userData', JSON.stringify(userData));

                // Redirect to login after 2 seconds
                setTimeout(function () {
                    window.location.href = 'login.html';
                }, 2000);
            }

            return false;
        }
    </script>
</body>

</html>
